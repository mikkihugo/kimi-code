<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Both UI themes (Terminal + Modern) are LIGHT. Declaring light-only keeps
         browsers and dark-mode extensions (e.g. 沉浸式翻译 / Dark Reader) from
         force-darkening <html>, which previously hijacked the page background and
         broke fixed-positioned popovers in Modern mode. -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#ffffff" />
    <title>Kimi Web</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
